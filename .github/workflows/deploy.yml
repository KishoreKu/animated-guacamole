name: Deploy Ghibli Studio

on:
  push:
    branches: [ main, master ]

env:
  PROJECT_ID: ghibli-studio-1775332583
  REGION: us-central1
  BACKEND_SERVICE_NAME: ghibli-backend
  FRONTEND_BUCKET: ghibli-frontend-1775336710
  IMAGE_NAME: us-central1-docker.pkg.dev/ghibli-studio-1775332583/ghibli-repo/backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Set up Docker Auth'
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: 'Build and Push Docker Image'
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.BACKEND_SERVICE_NAME }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --memory=2Gi
            --cpu=2
            --timeout=15m
          secrets: |
            GOOGLE_API_KEY=GOOGLE_API_KEY:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Upload to GCS'
        run: |
          # Clear old files to prevent stale assets
          gcloud storage rm gs://${{ env.FRONTEND_BUCKET }}/** || true
          
          # Upload new build
          gcloud storage cp -r dist/* gs://${{ env.FRONTEND_BUCKET }}/
          
          # Set correct content types and disable caching for index.html
          gcloud storage objects update gs://${{ env.FRONTEND_BUCKET }}/index.html \
            --content-type="text/html" \
            --cache-control="no-store, max-age=0"
            
          gcloud storage objects update gs://${{ env.FRONTEND_BUCKET }}/assets/*.js \
            --content-type="application/javascript"
