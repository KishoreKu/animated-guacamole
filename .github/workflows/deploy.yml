name: Deploy Ghibli Studio

on:
  push:
    branches: [ main, master ]

env:
  PROJECT_ID: ghibli-studio-prod
  REGION: us-central1
  BACKEND_SERVICE_NAME: ghibli-backend
  FRONTEND_BUCKET: ghibli-frontend-prod
  IMAGE_NAME: us-central1-docker.pkg.dev/ghibli-studio-prod/ghibli-repo/backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Set up Docker Auth'
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: 'Build and Push Docker Image'
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.BACKEND_SERVICE_NAME }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --memory=2Gi
            --cpu=2
            --timeout=15m
            --min-instances=1
          secrets: |
            GOOGLE_API_KEY=GOOGLE_API_KEY:latest
            SUPABASE_URL=SUPABASE_URL:latest
            SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest
            CRON_SECRET_TOKEN=CRON_SECRET_TOKEN:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Install and Build
        run: |
          # Dynamically fetch the backend URL from Cloud Run
          export VITE_API_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE_NAME }} --region ${{ env.REGION }} --format="value(status.url)")
          echo "Building frontend with API URL: $VITE_API_URL"
          
          npm install
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 'Upload to GCS'
        run: |
          # Clear old files to prevent stale assets
          gcloud storage rm gs://${{ env.FRONTEND_BUCKET }}/** || true
          
          # Upload new build
          gcloud storage cp -r dist/* gs://${{ env.FRONTEND_BUCKET }}/
          
          # Set correct content types and disable caching for index.html
          gcloud storage objects update gs://${{ env.FRONTEND_BUCKET }}/index.html \
            --content-type="text/html" \
            --cache-control="no-store, max-age=0"
            
          gcloud storage objects update gs://${{ env.FRONTEND_BUCKET }}/assets/*.js \
            --content-type="application/javascript"
